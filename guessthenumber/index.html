<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> Guess The Number</h1>
        <p>Μάντεψε έναν αριθμό από το 1 έως το 100</p>

        <input type="number" id="guessInput" min="1" max="100">
        <button id="guessBtn">Μάντεψε</button>
        <button id="restartBtn">Νέο Παιχνίδι</button>

        <p id="message">Καλή επιτυχία!</p>
        <p>Προσπάθειες: <span id="attempts">0</span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
